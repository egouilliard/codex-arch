[pytest]
markers =
    unit: Unit tests that verify individual components in isolation
    integration: Integration tests that verify the interactions between components
    e2e: End-to-end tests that verify the entire system
    api: API-specific tests
    cli: CLI-specific tests
    performance: Tests that verify system performance
    slow: Slow tests that should be run separately

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
console_output_style = progress
log_cli = True
log_cli_level = INFO

# Test timeout settings (in seconds)
timeout = 30
e2e_timeout = 120

# Environment variables for tests
env =
    TESTING=True
    LOG_LEVEL=INFO 