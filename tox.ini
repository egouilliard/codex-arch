[tox]
envlist = py37, py38, py39, py310, py311, lint, coverage
isolated_build = True
skip_missing_interpreters = True

[testenv]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    pytest-xdist>=3.0.0
    pytest-timeout>=2.0.0
    pytest-html>=3.0.0
commands =
    pytest {posargs:tests} --cov=codex_arch --cov-report=xml

[testenv:unit]
commands =
    pytest {posargs:tests} -k "not integration and not e2e" --cov=codex_arch --cov-report=xml

[testenv:integration]
commands =
    pytest {posargs:tests} -m "integration" --cov=codex_arch --cov-report=xml

[testenv:e2e]
deps =
    {[testenv]deps}
    pytest-html
commands =
    pytest {posargs:tests} -m "e2e" --cov=codex_arch --cov-report=xml

[testenv:lint]
deps =
    black>=23.0.0
    flake8>=6.0.0
    isort>=5.0.0
    mypy>=1.0.0
commands =
    black --check codex_arch tests
    flake8 codex_arch tests
    isort --check-only --profile=black codex_arch tests
    mypy codex_arch

[testenv:coverage]
deps =
    coverage>=7.0.0
    diff-cover>=7.0.0
commands =
    coverage report --fail-under=80
    coverage xml
    diff-cover coverage.xml --fail-under=80

[testenv:docs]
deps =
    sphinx>=6.0.0
    sphinx-rtd-theme>=1.0.0
commands =
    sphinx-build -b html docs docs/_build/html

[flake8]
max-line-length = 100
exclude = .tox,*.egg,build,data
select = E,W,F
ignore = E203, W503

[pytest]
testpaths = tests
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests

[coverage:run]
source = codex_arch
omit = 
    tests/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    raise ImportError 