name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - unit
        - integration
        - e2e
      verbose:
        description: 'Verbose output'
        required: false
        default: false
        type: boolean

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'unit' || github.event_name != 'workflow_dispatch' }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      
      - name: Run unit tests
        run: |
          python -m pytest -v tests/ -k "not integration and not e2e" --junitxml=unit-test-results.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-results
          path: |
            unit-test-results.xml
  
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'integration' || github.event_name != 'workflow_dispatch' }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      
      - name: Run integration tests
        run: |
          python -m pytest -v tests/ -m "integration" --junitxml=integration-test-results.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: |
            integration-test-results.xml
  
  end-to-end-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'e2e' || github.event_name != 'workflow_dispatch' }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          # Install additional dependencies for end-to-end tests
          pip install pytest-html pytest-cov
      
      - name: Run end-to-end tests
        run: |
          chmod +x tests/run_e2e_tests.sh
          ./tests/run_e2e_tests.sh ${{ github.event.inputs.verbose == 'true' && '-v' || '' }}
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-test-results
          path: |
            tests/output/*/report.html
            tests/output/*/junit.xml
  
  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, end-to-end-tests]
    if: always()
    outputs:
      unit_result: ${{ steps.set-results.outputs.unit_result }}
      integration_result: ${{ steps.set-results.outputs.integration_result }}
      e2e_result: ${{ steps.set-results.outputs.e2e_result }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download all test results
        uses: actions/download-artifact@v3
        with:
          path: test-results
      
      - name: Publish test report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/**/*.xml
          report_individual_runs: true
          check_name: "Test Results"
      
      - name: Generate combined coverage report
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          
          # Combine coverage data
          coverage combine test-results/*/.coverage || true
          
          # Generate coverage report
          coverage report
          coverage xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      
      - name: Set Results Output
        id: set-results
        if: always()
        run: |
          echo "unit_result=${{ needs.unit-tests.result }}" >> $GITHUB_OUTPUT
          echo "integration_result=${{ needs.integration-tests.result }}" >> $GITHUB_OUTPUT
          echo "e2e_result=${{ needs.end-to-end-tests.result }}" >> $GITHUB_OUTPUT

  # Only run if we're not in a pull request
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: test-report
    if: always() && github.event_name != 'pull_request'
    
    steps:
      # Use continue-on-error to prevent failures if webhook isn't configured
      - name: Send test status notification
        continue-on-error: true
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: testing
          SLACK_COLOR: ${{ needs.test-report.outputs.unit_result == 'success' && needs.test-report.outputs.integration_result == 'success' && needs.test-report.outputs.e2e_result == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: Test Results
          SLACK_MESSAGE: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Unit Tests: ${{ needs.test-report.outputs.unit_result }}
            Integration Tests: ${{ needs.test-report.outputs.integration_result }}
            End-to-End Tests: ${{ needs.test-report.outputs.e2e_result }}
            
            Run Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} 